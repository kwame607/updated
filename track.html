<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Order — WiseWave</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--tr:.35s cubic-bezier(.4,0,.2,1);}
[data-theme="light"]{--bg:#f8f7f4;--bg2:#fff;--bg3:#f0ede8;--bg4:#e8e4de;--card:#fff;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);--text:#0f0e0c;--text2:#3d3b35;--muted:#8a8780;--faint:#c8c5be;--gold:#b5922a;--gold-bg:rgba(181,146,42,.1);--teal:#0d6e6e;--teal-bg:rgba(13,110,110,.09);--coral:#c04a2e;--sh:0 2px 16px rgba(0,0,0,.06);--sh-lg:0 24px 64px rgba(0,0,0,.13);}
[data-theme="dark"]{--bg:#0c0c0f;--bg2:#141418;--bg3:#1a1a20;--bg4:#212128;--card:#1c1c24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.15);--text:#f2f0eb;--text2:#c0bdb5;--muted:#7a7870;--faint:#3a3830;--gold:#d4aa50;--gold-bg:rgba(212,170,80,.12);--teal:#4db8b8;--teal-bg:rgba(77,184,184,.1);--coral:#e07060;--sh:0 2px 16px rgba(0,0,0,.4);--sh-lg:0 24px 64px rgba(0,0,0,.7);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;transition:background var(--tr),color var(--tr);}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:62px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 5%;justify-content:space-between;z-index:10;backdrop-filter:blur(16px);transition:background var(--tr);}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--text);text-decoration:none;display:flex;align-items:baseline;gap:.04em;}
.logo-dot{color:var(--gold);font-size:1.9rem;line-height:0;position:relative;top:3px;}
.nav-right{display:flex;align-items:center;gap:12px;}
.nav-link{font-size:.78rem;font-weight:600;color:var(--muted);text-decoration:none;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;}
.nav-link:hover{color:var(--text);}
.tog{width:44px;height:23px;background:var(--bg4);border:1px solid var(--border2);border-radius:50px;cursor:pointer;position:relative;transition:background var(--tr);}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:var(--text);transition:transform var(--tr);}
[data-theme="dark"] .tog::after{transform:translateX(21px);}

/* PAGE */
.page{max-width:660px;margin:0 auto;padding:86px 20px 48px;}

/* SEARCH BOX */
.search-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;box-shadow:var(--sh);margin-bottom:24px;}
.search-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:600;margin-bottom:6px;}
.search-sub{font-size:.82rem;color:var(--muted);font-weight:300;margin-bottom:20px;}
.search-row{display:flex;gap:10px;}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;text-transform:uppercase;letter-spacing:.05em;}
.search-input:focus{border-color:var(--border2);}
.search-input::placeholder{text-transform:none;letter-spacing:0;color:var(--faint);}
.search-btn{background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:12px 22px;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:opacity .2s,transform .15s;white-space:nowrap;}
.search-btn:hover{opacity:.84;transform:translateY(-1px);}

/* RESULTS */
.result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--sh-lg);display:none;}
.result-card.show{display:block;}

/* STATUS HEADER */
.status-header{padding:24px 24px 20px;border-bottom:1px solid var(--border);}
.status-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
.order-ref-lbl{font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.order-ref-val{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;}
.sp-processing{background:var(--gold-bg);color:var(--gold);border:1px solid rgba(181,146,42,.2);}
.sp-packed    {background:rgba(147,51,234,.1);color:#7c3aed;border:1px solid rgba(147,51,234,.2);}
.sp-dispatched{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(13,110,110,.2);}
.sp-delivered {background:rgba(22,163,74,.1);color:#16a34a;border:1px solid rgba(22,163,74,.2);}
[data-theme="dark"] .sp-processing{border-color:rgba(212,170,80,.2);}
[data-theme="dark"] .sp-dispatched{border-color:rgba(77,184,184,.2);}
.delivery-est{display:flex;align-items:center;gap:10px;background:var(--teal-bg);border:1px solid rgba(13,110,110,.15);border-radius:8px;padding:10px 14px;}
.est-icon{font-size:1.4rem;}
.est-label{font-size:.82rem;font-weight:600;color:var(--teal);}
.est-sub{font-size:.7rem;color:var(--muted);margin-top:1px;}

/* TIMELINE */
.timeline-wrap{padding:24px;}
.timeline-title{font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
.timeline{position:relative;padding-left:36px;}
.timeline::before{content:'';position:absolute;left:11px;top:6px;bottom:6px;width:2px;background:var(--border);}
.tl-step{position:relative;margin-bottom:24px;}
.tl-step:last-child{margin-bottom:0;}
.tl-dot{position:absolute;left:-36px;top:2px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;border:2px solid var(--border);background:var(--card);transition:all .3s;}
.tl-dot.done{background:var(--teal);border-color:var(--teal);color:#fff;}
.tl-dot.current{background:var(--gold);border-color:var(--gold);color:#fff;box-shadow:0 0 0 4px var(--gold-bg);}
.tl-dot.pending{background:var(--card);border-color:var(--border);color:var(--faint);}
.tl-label{font-size:.88rem;font-weight:700;margin-bottom:3px;color:var(--text);}
.tl-label.pending{color:var(--muted);}
.tl-desc{font-size:.76rem;color:var(--muted);font-weight:300;line-height:1.55;}
.tl-time{font-size:.68rem;color:var(--faint);margin-top:3px;}
.tl-note{background:var(--bg3);border-radius:6px;padding:7px 10px;font-size:.75rem;color:var(--text2);margin-top:6px;border-left:2px solid var(--gold);}

/* ITEMS */
.items-section{padding:0 24px 20px;}
.items-title{font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.item-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.item-ic{font-size:1.5rem;min-width:32px;text-align:center;}
.item-name{font-size:.82rem;font-weight:600;flex:1;}
.item-qty{font-size:.72rem;color:var(--muted);}
.item-price{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;}

/* CUSTOMER SECTION */
.cust-section{padding:0 24px 24px;}
.cust-title{font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.cust-row{display:flex;justify-content:space-between;font-size:.8rem;padding:6px 0;border-bottom:1px solid var(--border);}
.cust-row:last-child{border-bottom:none;}
.cust-lbl{color:var(--muted);}
.cust-val{font-weight:600;text-align:right;max-width:60%;}

/* ACTIONS */
.track-actions{padding:0 24px 24px;display:flex;flex-direction:column;gap:10px;}
.btn-wa{background:#25d366;color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s;}
.btn-wa:hover{opacity:.88;}
.btn-ghost{background:transparent;color:var(--text);border:1.5px solid var(--border2);border-radius:8px;padding:12px;font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.btn-ghost:hover{background:var(--text);color:var(--bg);}

/* ERROR */
.error-state{padding:40px 24px;text-align:center;}
.error-ic{font-size:3rem;margin-bottom:12px;opacity:.4;}
.error-txt{font-size:.88rem;color:var(--muted);}

/* SPINNER */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:40px auto;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:600px){.page{padding:74px 16px 40px;}.search-row{flex-direction:column;}.status-header-top{flex-direction:column;gap:10px;}}
</style>
</head>
<body>

<nav class="nav">
  <a href="home.html" class="logo">WiseWave<span class="logo-dot">.</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-link">Shop</a>
    <a href="contact.html" class="nav-link">Contact</a>
    <button class="tog" onclick="toggleTheme()" aria-label="Toggle theme"></button>
  </div>
</nav>

<div class="page">

  <!-- SEARCH BOX -->
  <div class="search-card">
    <div class="search-title">Track Your Order</div>
    <div class="search-sub">Enter your WiseWave order reference (e.g. WW-ABC12345) to see live status and estimated delivery.</div>
    <div class="search-row">
      <input class="search-input" type="text" id="refInput" placeholder="e.g. WW-ABC12345"
             maxlength="14" oninput="this.value=this.value.toUpperCase()"
             onkeydown="if(event.key==='Enter') trackOrder()">
      <button class="search-btn" onclick="trackOrder()">Track →</button>
    </div>
  </div>

  <!-- RESULT CARD -->
  <div class="result-card" id="resultCard">
    <div id="resultInner"></div>
  </div>

</div>

<script>
(function(){ document.documentElement.dataset.theme = localStorage.getItem('ww-theme') || 'light'; })();
function toggleTheme(){
  const t = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  document.documentElement.dataset.theme = t;
  localStorage.setItem('ww-theme', t);
}

const BACKEND = 'http://127.0.0.1:8000';

// Auto-track if ref in URL
const urlRef = new URLSearchParams(location.search).get('ref');
if(urlRef){
  document.getElementById('refInput').value = urlRef.toUpperCase();
  trackOrder();
}

async function trackOrder(){
  const ref = document.getElementById('refInput').value.trim().toUpperCase();
  if(!ref){ return; }

  const card  = document.getElementById('resultCard');
  const inner = document.getElementById('resultInner');
  card.classList.add('show');
  inner.innerHTML = '<div class="spinner"></div>';

  try {
    const res  = await fetch(`${BACKEND}/track/${ref}`);
    if(!res.ok){
      showError('Order not found', `No order found with reference <strong>${ref}</strong>. Please double-check and try again.`);
      return;
    }
    const data = await res.json();
    showResult(data);
  } catch(err) {
    showError('Cannot reach server', 'The tracking server is not responding. Please try again or contact us on WhatsApp.');
  }
}

function showResult(data){
  const inner = document.getElementById('resultInner');

  // Status pill class
  const pillClass = {processing:'sp-processing', packed:'sp-packed', dispatched:'sp-dispatched', delivered:'sp-delivered'}[data.delivery_status] || 'sp-processing';
  const pillLabel = {processing:'Processing', packed:'Packed', dispatched:'Dispatched', delivered:'Delivered'}[data.delivery_status] || data.delivery_status;

  // Payment badge
  const payBadge = data.payment_status === 'paid'
    ? `<span style="background:rgba(22,163,74,.1);color:#16a34a;border:1px solid rgba(22,163,74,.2);border-radius:50px;padding:3px 10px;font-size:.65rem;font-weight:800;">✓ PAID</span>`
    : `<span style="background:var(--gold-bg);color:var(--gold);border:1px solid rgba(181,146,42,.2);border-radius:50px;padding:3px 10px;font-size:.65rem;font-weight:800;">AWAITING PAYMENT</span>`;

  // Estimated delivery block
  const estBlock = data.estimated_delivery ? `
    <div class="delivery-est">
      <span class="est-icon">🚚</span>
      <div>
        <div class="est-label">${data.estimated_delivery}</div>
        <div class="est-sub">${data.estimated_delivery_at
          ? 'Expected by ' + new Date(data.estimated_delivery_at).toLocaleDateString('en-GH',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
          : ''} ${data.delivery_region ? '· ' + data.delivery_region : ''}</div>
      </div>
    </div>` : '';

  // Timeline
  const timelineHTML = data.timeline.map((step, i) => {
    // Determine dot state
    const nextStep = data.timeline[i + 1];
    const isCurrent = step.done && (!nextStep || !nextStep.done);
    const dotClass  = isCurrent ? 'current' : step.done ? 'done' : 'pending';
    const dotIcon   = step.done ? '✓' : String(i + 1);
    const timeStr   = step.time && step.time !== 'None'
      ? new Date(step.time).toLocaleString('en-GH',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
      : null;
    return `
      <div class="tl-step">
        <div class="tl-dot ${dotClass}">${dotIcon}</div>
        <div class="tl-label ${step.done ? '' : 'pending'}">${step.label}</div>
        <div class="tl-desc">${step.desc}</div>
        ${timeStr ? `<div class="tl-time">${timeStr}</div>` : ''}
        ${isCurrent && data.tracking_note ? `<div class="tl-note">📝 ${data.tracking_note}</div>` : ''}
      </div>`;
  }).join('');

  // Items
  const itemsHTML = (data.items || []).map(i => `
    <div class="item-row">
      <span class="item-ic">${i.icon || '📦'}</span>
      <div class="item-name">${i.name}<div class="item-qty">Qty: ${i.qty}</div></div>
      <div class="item-price">GHS ${(i.price * i.qty).toLocaleString()}</div>
    </div>`).join('');

  // Order date
  const orderDate = data.created_at && data.created_at !== 'None'
    ? new Date(data.created_at).toLocaleDateString('en-GH',{day:'numeric',month:'long',year:'numeric'})
    : '—';

  const waMsg = encodeURIComponent(`Hi WiseWave! I'm checking on my order ${data.reference}`);

  inner.innerHTML = `
    <!-- STATUS HEADER -->
    <div class="status-header">
      <div class="status-header-top">
        <div>
          <div class="order-ref-lbl">Order Reference</div>
          <div class="order-ref-val">${data.reference}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
          <span class="status-pill ${pillClass}">${pillLabel}</span>
          ${payBadge}
        </div>
      </div>
      ${estBlock}
    </div>

    <!-- TIMELINE -->
    <div class="timeline-wrap">
      <div class="timeline-title">Order Progress</div>
      <div class="timeline">${timelineHTML}</div>
    </div>

    <!-- ITEMS -->
    <div class="items-section">
      <div class="items-title">Items (GHS ${Number(data.total_amount).toLocaleString()} total)</div>
      ${itemsHTML}
    </div>

    <!-- CUSTOMER INFO -->
    <div class="cust-section">
      <div class="cust-title">Delivery Details</div>
      <div class="cust-row"><span class="cust-lbl">Name</span><span class="cust-val">${data.customer_name}</span></div>
      <div class="cust-row"><span class="cust-lbl">Deliver to</span><span class="cust-val">${data.delivery_address}${data.delivery_region ? ', ' + data.delivery_region : ''}</span></div>
      <div class="cust-row"><span class="cust-lbl">Order Date</span><span class="cust-val">${orderDate}</span></div>
    </div>

    <!-- ACTIONS -->
    <div class="track-actions">
      <a class="btn-wa" href="https://wa.me/233595650930?text=${waMsg}" target="_blank">
        💬 WhatsApp WiseWave About This Order
      </a>
      <a class="btn-ghost" href="index.html">← Continue Shopping</a>
    </div>`;
}

function showError(title, msg){
  document.getElementById('resultInner').innerHTML = `
    <div class="error-state">
      <div class="error-ic">📦</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;margin-bottom:8px;">${title}</div>
      <div class="error-txt">${msg}</div>
      <a href="https://wa.me/233595650930" target="_blank"
         style="display:inline-block;margin-top:16px;background:#25d366;color:#fff;padding:10px 20px;border-radius:8px;font-size:.8rem;font-weight:700;text-decoration:none;">
        💬 Contact Us on WhatsApp
      </a>
    </div>`;
}
</script>
</body>
</html>
