<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Confirmation — WiseWave</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--tr:.35s cubic-bezier(.4,0,.2,1);}
[data-theme="light"]{--bg:#f8f7f4;--bg2:#fff;--bg3:#f0ede8;--card:#fff;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.15);--text:#0f0e0c;--text2:#3d3b35;--muted:#8a8780;--faint:#c8c5be;--gold:#b5922a;--gold-bg:rgba(181,146,42,.1);--teal:#0d6e6e;--teal-bg:rgba(13,110,110,.1);--red:#c04a2e;--red-bg:rgba(192,74,46,.1);--sh:0 2px 16px rgba(0,0,0,.06);--sh-lg:0 24px 64px rgba(0,0,0,.14);}
[data-theme="dark"]{--bg:#0c0c0f;--bg2:#141418;--bg3:#1a1a20;--card:#1c1c24;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.15);--text:#f2f0eb;--text2:#c0bdb5;--muted:#7a7870;--faint:#3a3830;--gold:#d4aa50;--gold-bg:rgba(212,170,80,.12);--teal:#4db8b8;--teal-bg:rgba(77,184,184,.12);--red:#e07060;--red-bg:rgba(224,112,96,.12);--sh:0 2px 16px rgba(0,0,0,.4);--sh-lg:0 24px 64px rgba(0,0,0,.75);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:background var(--tr),color var(--tr);}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:62px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 5%;justify-content:space-between;z-index:10;transition:background var(--tr);}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--text);text-decoration:none;display:flex;align-items:baseline;gap:.04em;}
.logo-dot{color:var(--gold);font-size:1.9rem;line-height:0;position:relative;top:3px;}
.nav-back{font-size:.78rem;font-weight:600;color:var(--muted);text-decoration:none;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;}
.nav-back:hover{color:var(--text);}

/* CARD */
.page-wrap{width:100%;max-width:560px;margin-top:62px;padding:24px 0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--sh-lg);}

/* LOADING STATE */
.loading-state{padding:56px 32px;text-align:center;}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;margin-bottom:8px;}
.loading-sub{font-size:.82rem;color:var(--muted);font-weight:300;}

/* SUCCESS STATE */
.success-header{background:var(--teal);padding:32px;text-align:center;}
.success-icon{font-size:3.5rem;margin-bottom:12px;animation:pop .5s cubic-bezier(.4,0,.2,1);}
@keyframes pop{0%{transform:scale(0);}65%{transform:scale(1.15);}100%{transform:scale(1);}}
.success-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:#fff;margin-bottom:6px;}
.success-sub{font-size:.82rem;color:rgba(255,255,255,.75);font-weight:300;}

.receipt-body{padding:28px;}

/* ORDER REF */
.ref-box{background:var(--bg3);border-radius:10px;padding:14px 18px;text-align:center;margin-bottom:24px;border:1px solid var(--border);}
.ref-label{font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.ref-value{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;letter-spacing:.05em;}

/* SECTION */
.receipt-section{margin-bottom:22px;}
.receipt-sec-title{font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:7px 0;border-bottom:1px solid var(--border);font-size:.82rem;}
.info-row:last-child{border-bottom:none;}
.info-lbl{color:var(--muted);font-weight:400;flex-shrink:0;}
.info-val{font-weight:600;text-align:right;color:var(--text);}

/* ITEMS */
.item-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.item-left{display:flex;align-items:center;gap:10px;}
.item-icon{font-size:1.4rem;}
.item-name{font-size:.82rem;font-weight:600;}
.item-qty{font-size:.72rem;color:var(--muted);}
.item-price{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;}

/* TOTAL ROW */
.total-row{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0 0;border-top:2px solid var(--border2);margin-top:4px;}
.total-lbl{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.total-amt{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--gold);}

/* WHAT NEXT */
.next-steps{background:var(--bg3);border-radius:10px;padding:18px;margin-bottom:22px;border:1px solid var(--border);}
.next-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.next-step:last-child{margin-bottom:0;}
.step-dot{width:24px;height:24px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;margin-top:1px;}
.step-txt{font-size:.8rem;color:var(--text2);line-height:1.6;}
.step-txt strong{color:var(--text);}

/* ACTIONS */
.actions{display:flex;flex-direction:column;gap:10px;}
.btn-main{background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:13px;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:opacity .2s,transform .15s;}
.btn-main:hover{opacity:.84;transform:translateY(-1px);}
.btn-wa{background:#25d366;color:#fff;border:none;border-radius:8px;padding:13px;font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.08em;cursor:pointer;text-decoration:none;display:block;text-align:center;transition:opacity .2s;}
.btn-wa:hover{opacity:.88;}

/* FAILED STATE */
.failed-header{background:var(--red);padding:32px;text-align:center;}
.failed-icon{font-size:3rem;margin-bottom:12px;}
.failed-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:#fff;margin-bottom:6px;}
.failed-sub{font-size:.82rem;color:rgba(255,255,255,.75);}
.failed-body{padding:28px;}
.failed-note{background:var(--red-bg);border:1px solid rgba(192,74,46,.2);border-radius:10px;padding:16px;font-size:.82rem;color:var(--red);margin-bottom:20px;line-height:1.65;}
[data-theme="dark"] .failed-note{border-color:rgba(224,112,96,.2);}

@media(max-width:600px){
  .receipt-body{padding:20px;}
  .success-header{padding:24px;}
  .ref-value{font-size:1.2rem;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="logo">WiseWave<span class="logo-dot">.</span></a>
  <a href="index.html" class="nav-back">← Back to Shop</a>
</nav>

<!-- PAGE CONTENT (filled by JS) -->
<div class="page-wrap">
  <div class="card" id="mainCard">
    <!-- Loading state shown first -->
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-title">Verifying your payment…</div>
      <div class="loading-sub">Please wait, this takes just a moment.</div>
    </div>
  </div>
</div>

<script>
/* ─── THEME ─── */
(function(){ document.documentElement.dataset.theme = localStorage.getItem('ww-theme') || 'light'; })();

const BACKEND = 'http://127.0.0.1:8000';

/* ─── GET REFERENCE FROM URL ─── */
const params = new URLSearchParams(window.location.search);

// Paystack sends back: ?trxref=WW-XXXXX&reference=WW-XXXXX
// We stored our reference as the Paystack reference, so either field works
// BUT Paystack's 'reference' param is our WW-XXXXXXXX ref — use that first
let ref = params.get('ref') || params.get('reference') || params.get('trxref');

// Strip any extra characters (sometimes Paystack appends extra data)
if(ref) ref = ref.trim().toUpperCase();

console.log('Payment success page loaded. URL params:', location.search);
console.log('Extracted ref:', ref);

if(!ref){
  showError('No order reference found.', 'It looks like you arrived here without a valid order reference. Please contact us on WhatsApp with your payment details.');
} else {
  verifyPayment(ref);
}

/* ─── VERIFY WITH BACKEND ─── */
async function verifyPayment(reference){
  console.log('Verifying payment for:', reference);
  try {
    const res  = await fetch(`${BACKEND}/verify-payment/${reference}`);
    
    // If backend returns 404, order not found
    if(res.status === 404){
      showError(
        'Order not found',
        `No order found with reference <strong>${reference}</strong>.<br><br>
        If you just paid, your money is safe. Please contact us on WhatsApp with:<br>
        • Your reference: <strong>${reference}</strong><br>
        • Your phone number used for payment`
      );
      return;
    }
    
    const data = await res.json();
    console.log('Verify response:', data);

    if(res.ok && data.paid){
      showSuccess(data);
    } else {
      showFailed(reference, data.status || 'unknown');
    }
  } catch(err){
    console.error('Verification error:', err);
    // Show a helpful message — money is safe, just contact support
    showError(
      'Server not reachable',
      `Your payment may have gone through — we just could not confirm it automatically.<br><br>
      <strong>Your money is safe.</strong><br><br>
      Please WhatsApp us with:<br>
      • Your reference: <strong>${reference}</strong><br>
      • Your MoMo number used for payment<br><br>
      We will confirm your order and send your receipt manually.`
    );
  }
}

/* ─── SUCCESS VIEW ─── */
function showSuccess(data){
  const items = (data.items || []).map(i => `
    <div class="item-row">
      <div class="item-left">
        <span class="item-icon">${i.icon || '📦'}</span>
        <div>
          <div class="item-name">${i.name}</div>
          <div class="item-qty">Qty: ${i.qty}</div>
        </div>
      </div>
      <div class="item-price">GHS ${(i.price * i.qty).toLocaleString()}</div>
    </div>`).join('');

  document.getElementById('mainCard').innerHTML = `
    <!-- SUCCESS HEADER -->
    <div class="success-header">
      <div class="success-icon">🎉</div>
      <div class="success-title">Payment Successful!</div>
      <div class="success-sub">Your order has been confirmed and is being processed.</div>
    </div>

    <div class="receipt-body">

      <!-- ORDER REFERENCE -->
      <div class="ref-box">
        <div class="ref-label">Your Order Reference</div>
        <div class="ref-value">${data.reference}</div>
      </div>

      <!-- CUSTOMER INFO -->
      <div class="receipt-section">
        <div class="receipt-sec-title">Customer Details</div>
        <div class="info-row"><span class="info-lbl">Name</span><span class="info-val">${data.customer_name}</span></div>
        <div class="info-row"><span class="info-lbl">Phone</span><span class="info-val">${data.customer_phone}</span></div>
        <div class="info-row"><span class="info-lbl">Email</span><span class="info-val">${data.customer_email}</span></div>
        <div class="info-row"><span class="info-lbl">Delivery To</span><span class="info-val">${data.delivery_address}</span></div>
      </div>

      <!-- ITEMS -->
      <div class="receipt-section">
        <div class="receipt-sec-title">Items Ordered</div>
        ${items}
        <div class="total-row">
          <span class="total-lbl">Total Paid</span>
          <span class="total-amt">GHS ${Number(data.total_amount).toLocaleString()}</span>
        </div>
      </div>

      <!-- ESTIMATED DELIVERY -->
      ${data.estimated_delivery ? `
      <div class="receipt-section">
        <div class="receipt-sec-title">Estimated Delivery</div>
        <div style="background:var(--teal-bg);border:1px solid rgba(13,110,110,.18);border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:14px;">
          <span style="font-size:2rem;">🚚</span>
          <div>
            <div style="font-size:1rem;font-weight:700;color:var(--teal);">${data.estimated_delivery}</div>
            <div style="font-size:.75rem;color:var(--muted);margin-top:2px;">
              ${data.delivery_region ? 'Delivery to ' + data.delivery_region : ''} · 
              ${data.estimated_delivery_at ? 'Expected by ' + new Date(data.estimated_delivery_at).toLocaleDateString('en-GH',{weekday:'long',day:'numeric',month:'long'}) : ''}
            </div>
          </div>
        </div>
      </div>` : ''}

      <!-- WHAT HAPPENS NEXT -->
      <div class="receipt-section">
        <div class="receipt-sec-title">What Happens Next</div>
        <div class="next-steps">
          <div class="next-step">
            <div class="step-dot">✓</div>
            <div class="step-txt"><strong>Email receipt sent</strong> — Check ${data.customer_email} for your full receipt.</div>
          </div>
          <div class="next-step">
            <div class="step-dot">2</div>
            <div class="step-txt"><strong>Packing</strong> — We pack your item(s) within 1 business day of payment confirmation.</div>
          </div>
          <div class="next-step">
            <div class="step-dot">3</div>
            <div class="step-txt"><strong>Dispatch</strong> — Your order is sent to <strong>${data.delivery_address}</strong>. You'll get an update.</div>
          </div>
        </div>
      </div>

      <!-- ACTIONS -->
      <div class="actions">
        <a href="track.html?ref=${data.reference}" class="btn-main">📦 Track My Order</a>
        <a href="https://wa.me/233595650930?text=Hi%20WiseWave!%20My%20order%20ref%20is%20${data.reference}"
           target="_blank" class="btn-wa">💬 WhatsApp Us</a>
        <a href="index.html" style="display:block;text-align:center;font-size:.75rem;color:var(--muted);margin-top:4px;text-decoration:none;">
          ← Continue Shopping
        </a>
      </div>

      <p style="text-align:center;font-size:.7rem;color:var(--faint);margin-top:16px;">
        Order reference: <strong>${data.reference}</strong> — save this for tracking and support.
      </p>
    </div>`;
}

/* ─── FAILED VIEW ─── */
function showFailed(reference, status){
  document.getElementById('mainCard').innerHTML = `
    <div class="failed-header">
      <div class="failed-icon">❌</div>
      <div class="failed-title">Payment Not Confirmed</div>
      <div class="failed-sub">Status: ${status}</div>
    </div>
    <div class="failed-body">
      <div class="failed-note">
        We could not confirm your payment for order <strong>${reference}</strong>.<br><br>
        If money was deducted from your MoMo account, please contact us immediately on WhatsApp with your order reference and we will sort it out for you.
      </div>
      <div class="actions">
        <a href="https://wa.me/233595650930?text=Hi%20WiseWave!%20I%20had%20a%20payment%20issue.%20Order%20ref:%20${reference}"
           target="_blank" class="btn-wa">💬 Contact Us on WhatsApp</a>
        <a href="index.html" class="btn-main" style="margin-top:6px;">Try Again</a>
      </div>
    </div>`;
}

/* ─── ERROR VIEW ─── */
function showError(title, message){
  document.getElementById('mainCard').innerHTML = `
    <div class="failed-header">
      <div class="failed-icon">⚠️</div>
      <div class="failed-title">${title}</div>
      <div class="failed-sub">Don't worry — your money is safe.</div>
    </div>
    <div class="failed-body">
      <div class="failed-note">${message}</div>
      <div class="actions">
        <a href="https://wa.me/233595650930" target="_blank" class="btn-wa">💬 Contact Us on WhatsApp</a>
        <a href="index.html" class="btn-main" style="margin-top:6px;">← Back to Shop</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
